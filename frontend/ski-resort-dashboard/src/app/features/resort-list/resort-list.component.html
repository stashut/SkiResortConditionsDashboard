<section class="resort-list">
  <mat-card class="resort-list__card">
    <mat-card-header>
      <div mat-card-avatar class="resort-list__icon">
        <mat-icon>terrain</mat-icon>
      </div>
      <div>
        <mat-card-title>Resorts</mat-card-title>
        <mat-card-subtitle>
          Browse all ski resorts and jump into live conditions.
        </mat-card-subtitle>
      </div>
    </mat-card-header>

    <mat-card-content>
      <div class="resort-list__content" *ngIf="!loading && !error; else state">
        <table mat-table [dataSource]="resorts" class="mat-elevation-z2">
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Resort</th>
            <td mat-cell *matCellDef="let resort">
              <span class="resort-list__name">{{ resort.name }}</span>
              <span
                class="resort-list__badge resort-list__badge--live"
                *ngIf="resort.hasLiveUpdate"
              >
                Live update
              </span>
            </td>
          </ng-container>

          <ng-container matColumnDef="region">
            <th mat-header-cell *matHeaderCellDef>Region</th>
            <td mat-cell *matCellDef="let resort">
              {{ resort.region }}
            </td>
          </ng-container>

          <ng-container matColumnDef="baseElevation">
            <th mat-header-cell *matHeaderCellDef>Base</th>
            <td mat-cell *matCellDef="let resort">
              <span *ngIf="resort.elevationBaseMeters != null">
                {{ resort.elevationBaseMeters }}m
              </span>
              <span *ngIf="resort.elevationBaseMeters == null">–</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="summitElevation">
            <th mat-header-cell *matHeaderCellDef>Summit</th>
            <td mat-cell *matCellDef="let resort">
              <span *ngIf="resort.elevationTopMeters != null">
                {{ resort.elevationTopMeters }}m
              </span>
              <span *ngIf="resort.elevationTopMeters == null">–</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="favorite">
            <th mat-header-cell *matHeaderCellDef>Favorite</th>
            <td mat-cell *matCellDef="let resort">
              <button
                mat-icon-button
                color="primary"
                (click)="toggleFavorite(resort)"
                [matTooltip]="resort.isFavorite ? 'Remove favorite' : 'Add favorite'"
              >
                <mat-icon>
                  {{ resort.isFavorite ? 'favorite' : 'favorite_border' }}
                </mat-icon>
              </button>
            </td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let resort">
              <button
                mat-stroked-button
                color="accent"
                (click)="navigateTo(resort)"
              >
                View details
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </div>

      <ng-template #state>
        <div class="resort-list__state" *ngIf="loading">
          <mat-progress-spinner
            mode="indeterminate"
            diameter="40"
          ></mat-progress-spinner>
          <p>Loading resorts…</p>
        </div>

        <div
          class="resort-list__state resort-list__state--error"
          *ngIf="!loading && error"
        >
          <p>{{ error }}</p>
        </div>
      </ng-template>
    </mat-card-content>
  </mat-card>
</section>
